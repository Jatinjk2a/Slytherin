<body class="bg-surface text-on-surface font-body selection:bg-hazelnut/30">
<!-- Navigation suppressed per rules (Transactional flow) -->
<main class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
<!-- Decorative Bottom Gradient for Depth -->
<div class="fixed bottom-0 left-0 w-full h-32 bg-gradient-to-t from-zinc-50/50 to-transparent pointer-events-none"></div>
<!-- Background Accents -->
<div class="absolute -top-24 -left-24 w-96 h-96 bg-hazelnut/5 rounded-full blur-[100px]"></div>
<div class="absolute -bottom-24 -right-24 w-96 h-96 bg-primary/5 rounded-full blur-[100px]"></div>
<div class="w-full max-w-md bg-surface-container-lowest p-8 md:p-10 rounded-3xl shadow-2xl shadow-on-surface/5 relative z-10">
<!-- Logo/Icon Header -->
<div class="flex flex-col items-center mb-8">
<div class="w-16 h-16 bg-surface-container-low rounded-2xl flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-hazelnut text-3xl" data-icon="lock_open">lock_open</span>
</div>
<h1 class="font-headline font-extrabold text-3xl tracking-tight text-on-surface mb-2">Forgot Password?</h1>
<p class="text-on-surface-variant text-center text-sm leading-relaxed max-w-[280px]">
                    Enter your email to receive a password reset link.
                </p>
</div>
<!-- Form -->
<form class="space-y-6" onsubmit="return false;">
<div class="space-y-2">
<label class="font-label text-xs font-semibold uppercase tracking-wider text-outline px-1" for="email">Email Address</label>
<div class="relative group">
<input class="w-full h-14 bg-surface-container-low border-0 rounded-2xl px-6 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-hazelnut/30 transition-all outline-none" id="email" name="email" placeholder="yourname@example.com" type="email"/>
</div>
</div>
<button class="w-full h-14 glow-button text-white font-label font-bold rounded-2xl flex items-center justify-center gap-2 hover:opacity-90 active:scale-[0.98] transition-all" type="submit">
                    Send Reset Link
                    <span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-10 flex items-center">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="flex-shrink mx-4 text-[10px] font-bold tracking-[0.2em] text-outline uppercase">OR CONTINUE WITH</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<!-- Social Buttons -->
<div class="grid grid-cols-2 gap-4 mb-10">
<button class="flex items-center justify-center gap-3 h-14 bg-surface-container-low hover:bg-surface-container-high rounded-2xl transition-colors group">
<img alt="Google Logo" class="w-5 h-5 grayscale group-hover:grayscale-0 transition-all" data-alt="minimalist google logo icon with clean edges" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCWc0BV81ZsOacKJQJmM0LR4zyWTB4h4gVz3j2L_Xrve9Seqo7wSFfaGLS4MY-Is_k0DKOeiUP1PItKFHKCL8AYyvG2Gq_iw1Wfi2stuy6Crs_5_WhreJaMYJBOu-Tj9WiNN0r857Nr4R6eroWOM0oUFCVgWND_739jG3JmfZ8ec6TiZDKskF4rQ7PXUCY5qHnhm9nPhJwVqmqv8bh3BlWo-JAHkt0p0RePKfbWUB8wPd6c5uqJM52oyAp17dzgNFtKDZK1Z8T1Z5eK"/>
<span class="font-label text-sm font-semibold text-on-surface-variant group-hover:text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center gap-3 h-14 bg-surface-container-low hover:bg-surface-container-high rounded-2xl transition-colors group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-on-surface" data-icon="terminal">terminal</span>
<span class="font-label text-sm font-semibold text-on-surface-variant group-hover:text-on-surface">GitHub</span>
</button>
</div>
<!-- Footer Link -->
<div class="text-center">
<a class="inline-flex items-center gap-1 text-sm text-on-surface-variant hover:text-hazelnut transition-colors font-medium" href="#">
                    Wait, I remember it! <span class="text-hazelnut font-bold">Log In</span>
</a>
</div>
</div>
</main>
<!-- Footer Segment -->
<footer class="w-full py-8">
<div class="flex flex-col items-center gap-4 w-full">
<p class="font-inter text-[10px] tracking-widest uppercase text-zinc-400">© 2024 Luminescent Logic. Editorial Documentation.</p>
<div class="flex gap-6">
<a class="font-inter text-xs tracking-wide uppercase text-zinc-400 hover:text-zinc-900 transition-opacity duration-200" href="#">Privacy Policy</a>
<a class="font-inter text-xs tracking-wide uppercase text-zinc-400 hover:text-zinc-900 transition-opacity duration-200" href="#">Terms of Service</a>
<a class="font-inter text-xs tracking-wide uppercase text-zinc-400 hover:text-zinc-900 transition-opacity duration-200" href="#">Help Center</a>
</div>
</div>
</footer>

<script type="module">
  import { showToast } from './js/api.js';

  const form = document.querySelector('form');
  const submitBtn = form?.querySelector('button[type="submit"]');

  if (form) {
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Sending...'; }
      setTimeout(() => {
        showToast('If an account exists with that email, a reset link has been sent.', 'success', 5000);
        if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Send Reset Link'; }
      }, 1200);
    });
  }

  // Wire "Log In" links
  document.querySelectorAll('a').forEach(a => {
    const text = a.textContent.trim().toLowerCase();
    if (text.includes('log in') || text.includes('login') || text.includes('sign in')) a.href = 'login.html';
    if (text.includes('sign up') || text.includes('signup')) a.href = 'stitch-signup.html';
  });
</script>
