<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | README AI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;700;800&amp;family=Inter:wght@300;400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-container": "#606ad4",
                    "surface-bright": "#faf8ff",
                    "on-tertiary-fixed-variant": "#6900b3",
                    "inverse-surface": "#283044",
                    "on-primary-fixed": "#000767",
                    "on-primary-fixed-variant": "#2f3aa3",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-fixed": "#2c0051",
                    "on-primary-container": "#fffbff",
                    "secondary-fixed": "#c9e6ff",
                    "on-surface": "#131b2e",
                    "on-tertiary": "#ffffff",
                    "error-container": "#ffdad6",
                    "surface-container-low": "#f2f3ff",
                    "inverse-primary": "#bdc2ff",
                    "tertiary": "#8127cf",
                    "surface-container-highest": "#dae2fd",
                    "surface-tint": "#4953bc",
                    "on-tertiary-container": "#fffbff",
                    "on-error-container": "#93000a",
                    "primary-fixed-dim": "#bdc2ff",
                    "on-secondary-fixed-variant": "#004c6e",
                    "tertiary-fixed": "#f0dbff",
                    "secondary-container": "#39b8fd",
                    "primary": "#4651b9",
                    "tertiary-container": "#9c48ea",
                    "on-primary": "#ffffff",
                    "surface-container-high": "#e2e7ff",
                    "primary-fixed": "#e0e0ff",
                    "outline": "#767586",
                    "on-secondary": "#ffffff",
                    "outline-variant": "#c7c4d7",
                    "on-error": "#ffffff",
                    "surface": "#faf8ff",
                    "on-background": "#131b2e",
                    "background": "#faf8ff",
                    "surface-container": "#eaedff",
                    "secondary-fixed-dim": "#89ceff",
                    "secondary": "#006591",
                    "error": "#ba1a1a",
                    "on-surface-variant": "#464554",
                    "inverse-on-surface": "#eef0ff",
                    "on-secondary-fixed": "#001e2f",
                    "on-secondary-container": "#004666",
                    "tertiary-fixed-dim": "#ddb7ff",
                    "surface-variant": "#dae2fd",
                    "surface-dim": "#d2d9f4"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "2xl": "1rem",
                    "3xl": "1.5rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hazelnut-btn {
            background-color: #cfb095;
            color: #ffffff;
        }
        .hazelnut-btn:hover {
            background-color: #c4a184;
        }
    </style>
</head>
<body class="bg-[#ffffff] font-body text-on-background min-h-screen flex items-center justify-center selection:bg-surface-container-highest">
<main class="w-full max-w-md px-6 py-12">
<div class="flex flex-col items-center mb-12">
<div class="mb-8 p-4 rounded-3xl bg-surface-container-low">
<span class="material-symbols-outlined text-4xl text-[#cfb095]" data-icon="auto_awesome">auto_awesome</span>
</div>
<h1 class="font-headline text-4xl font-extrabold tracking-tighter text-on-surface mb-3">README AI</h1>
<p class="text-on-surface-variant font-light tracking-tight">Welcome back to the digital curator.</p>
</div>
<div class="bg-white p-8 rounded-3xl transition-all">
<form class="space-y-6">
<div>
<label class="block text-xs font-semibold text-outline mb-2 ml-1 uppercase tracking-widest" for="email">Work Email</label>
<input class="w-full bg-surface-container-lowest border-none ring-1 ring-outline-variant/30 rounded-2xl p-4 text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-[#cfb095]/40 transition-all outline-none" id="email" placeholder="curator@readme.ai" type="email"/>
</div>
<div>
<div class="flex justify-between items-center mb-2 ml-1">
<label class="block text-xs font-semibold text-outline uppercase tracking-widest" for="password">Password</label>
<a class="text-xs font-medium text-[#cfb095] hover:underline transition-all" href="#">Forgot?</a>
</div>
<input class="w-full bg-surface-container-lowest border-none ring-1 ring-outline-variant/30 rounded-2xl p-4 text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-[#cfb095]/40 transition-all outline-none" id="password" placeholder="••••••••" type="password"/>
</div>
<button class="hazelnut-btn w-full py-4 rounded-2xl font-headline font-bold text-sm tracking-widest uppercase shadow-sm hover:shadow-lg transition-all active:scale-[0.98]" type="submit">
                    Sign In
                </button>
</form>
<div class="relative my-10">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/20"></div>
</div>
<div class="relative flex justify-center text-xs uppercase tracking-widest">
<span class="bg-white px-4 text-outline font-medium">Or continue with</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 px-4 rounded-2xl ring-1 ring-outline-variant/30 hover:bg-surface-container-low transition-all text-sm font-medium text-on-surface">
<span class="material-symbols-outlined text-xl" data-icon="brand_family_google">google</span>
                    Google
                </button>
<button class="flex items-center justify-center gap-2 py-3 px-4 rounded-2xl ring-1 ring-outline-variant/30 hover:bg-surface-container-low transition-all text-sm font-medium text-on-surface">
<span class="material-symbols-outlined text-xl" data-icon="code">code</span>
                    GitHub
                </button>
</div>
</div>
<footer class="mt-12 text-center">
<p class="text-sm text-outline-variant">
                New to the platform? 
                <a class="text-[#cfb095] font-semibold hover:text-[#c4a184] transition-colors ml-1" href="#">Create an account</a>
</p>
</footer>
</main>
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 overflow-hidden">
<div class="absolute -top-[10%] -left-[5%] w-[40%] h-[40%] bg-[#cfb095]/5 blur-[120px] rounded-full"></div>
<div class="absolute -bottom-[10%] -right-[5%] w-[40%] h-[40%] bg-primary-container/5 blur-[120px] rounded-full"></div>
</div>
</body></html>
