version: '3.9'

services:
  # ── Node.js API ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: production
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/readme_ai
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file: .env
    depends_on:
      - mongo
      - redis
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3

  # ── BullMQ Worker ────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      target: production
    command: node src/workers/generationWorker.js
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/readme_ai
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file: .env
    depends_on:
      - mongo
      - redis
    restart: unless-stopped
    deploy:
      replicas: 2  # Scale workers independently

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  mongo_data:
  redis_data:
